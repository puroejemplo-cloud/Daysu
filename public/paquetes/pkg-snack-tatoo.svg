  <rect x="14" y="40" width="100" height="62" rx="5" fill="none" stroke="#a7f3d0" stroke-width="0.8"/>
  <!-- Cart items on shelf -->
  <!-- Popcorn bag -->
  <path d="M30 40 L26 22 L46 22 L42 40 Z" fill="#dc2626" fill-opacity="0.7"/>
  <rect x="26" y="16" width="20" height="8" rx="2" fill="#fbbf24" fill-opacity="0.7"/>
  <circle cx="31" cy="13" r="5" fill="#fde68a" fill-opacity="0.9"/>
  <circle cx="36" cy="10" r="5" fill="#fef3c7" fill-opacity="0.9"/>
  <circle cx="41" cy="13" r="5" fill="#fde68a" fill-opacity="0.9"/>
  <!-- Shot glass -->
