  <rect x="91" y="28" width="10" height="5" rx="1" fill="#1e293b" stroke="#6b7280" stroke-width="0.6"/>
  <rect x="91" y="35" width="10" height="5" rx="1" fill="#1e293b" stroke="#6b7280" stroke-width="0.6"/>
  <line x1="96" y1="50" x2="96" y2="57" stroke="#a78bfa" stroke-width="1.5"/>
  <!-- LED strip bottom of cart -->
  <rect x="16" y="100" width="96" height="3" rx="1" fill="#34d399" fill-opacity="0.5" filter="url(#st-glow)"/>
  <!-- Cart handle -->
  <rect x="106" y="38" width="10" height="46" rx="4" fill="#0a1a0a" stroke="#34d399" stroke-width="1.2"/>
  <!-- Wheels -->
  <circle cx="30"  cy="108" r="9" fill="#050f05" stroke="#34d399" stroke-width="1.5"/>
  <circle cx="30"  cy="108" r="4" fill="#34d399" fill-opacity="0.35"/>
  <circle cx="98"  cy="108" r="9" fill="#050f05" stroke="#34d399" stroke-width="1.5"/>
  <circle cx="98"  cy="108" r="4" fill="#34d399" fill-opacity="0.35"/>
  <!-- Floating stars/sparkles around cart -->
  <circle cx="6"  cy="55" r="2.5" fill="#34d399" fill-opacity="0.8" filter="url(#st-glow)"/>
  <circle cx="6"  cy="75" r="2"   fill="#fbbf24" fill-opacity="0.7" filter="url(#st-glow)"/>
  <circle cx="128" cy="50" r="2.5" fill="#a78bfa" fill-opacity="0.8" filter="url(#st-glow)"/>
  <circle cx="128" cy="70" r="2"   fill="#34d399" fill-opacity="0.7" filter="url(#st-glow)"/>
  <text x="-4"  y="38" font-family="Arial" font-size="14" fill="#34d399" fill-opacity="0.6">✦</text>
  <text x="122" y="38" font-family="Arial" font-size="14" fill="#fbbf24" fill-opacity="0.6">✦</text>
  <!-- Glow -->
  <ellipse cx="64" cy="120" rx="65" ry="6" fill="#34d399" fill-opacity="0.15" filter="url(#st-glow)"/>
</g>

<text x="400" y="438" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#6ee7b7" letter-spacing="3">TATOO · SNACKS · SHOTS · TODO INCLUIDO</text>
<rect x="0" y="448" width="800" height="2" fill="url(#st-gold)"/>
</svg>
