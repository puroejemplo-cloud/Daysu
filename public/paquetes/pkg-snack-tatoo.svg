<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
<defs>
  <radialGradient id="st-bg" cx="50%" cy="35%" r="75%">
    <stop offset="0%" stop-color="#0a1a12"/><stop offset="100%" stop-color="#030806"/>
  </radialGradient>
  <linearGradient id="st-gold" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#f59e0b" stop-opacity="0"/><stop offset="30%" stop-color="#f59e0b"/>
    <stop offset="70%" stop-color="#fbbf24"/><stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
  </linearGradient>
  <filter id="st-neo" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur stdDeviation="12" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="st-glow" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>

<rect width="800" height="450" fill="url(#st-bg)"/>
<ellipse cx="400" cy="160" rx="360" ry="180" fill="#34d399" fill-opacity="0.04"/>
<rect x="0" y="0" width="800" height="2" fill="url(#st-gold)"/>

<text x="400" y="44" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#6ee7b7" letter-spacing="9">PAQUETE · SONIDO DAYSU · DJ IVÁN EVENTS</text>
<text x="400" y="96" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="44" font-weight="900" fill="#34d399" fill-opacity="0.5" letter-spacing="2" filter="url(#st-neo)">SNACK TATOO</text>
<text x="400" y="96" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="44" font-weight="900" fill="#ffffff" letter-spacing="2">SNACK TATOO</text>

<line x1="80" y1="113" x2="720" y2="113" stroke="url(#st-gold)" stroke-width="1.2"/>

<text x="400" y="150" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="32" font-weight="900" fill="#fbbf24" filter="url(#st-glow)">$24,000 MXN</text>
<text x="400" y="170" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#94a3b8" letter-spacing="3">5 HRS + 1 RECEPCIÓN · HASTA 500 PERSONAS</text>

<line x1="160" y1="183" x2="640" y2="183" stroke="url(#st-gold)" stroke-width="0.7" stroke-opacity="0.4"/>

<text x="220" y="210" font-family="Arial,sans-serif" font-size="13.5" fill="#34d399">✦</text>
<text x="244" y="210" font-family="Arial,sans-serif" font-size="13.5" fill="#e2e8f0">Todo Diamante + Tatoo &amp; glitter personalizados</text>
<text x="220" y="235" font-family="Arial,sans-serif" font-size="13.5" fill="#34d399">✦</text>
<text x="244" y="235" font-family="Arial,sans-serif" font-size="13.5" fill="#e2e8f0">Vals en las nubes doble (humo efecto niebla)</text>
<text x="220" y="260" font-family="Arial,sans-serif" font-size="13.5" fill="#34d399">✦</text>
<text x="244" y="260" font-family="Arial,sans-serif" font-size="13.5" fill="#e2e8f0">Carrito maruchanfest disponible (+$2,000)</text>
<text x="220" y="285" font-family="Arial,sans-serif" font-size="13.5" fill="#34d399">✦</text>
<text x="244" y="285" font-family="Arial,sans-serif" font-size="13.5" fill="#94a3b8" font-style="italic">+Pista LED cristal infinito 5×5 por $8,000</text>

<!-- Bottom strip -->
<rect x="0" y="302" width="800" height="148" fill="#030a06"/>
<line x1="0" y1="302" x2="800" y2="302" stroke="url(#st-gold)" stroke-width="1.2"/>

<!-- ICON: Shopping cart with stars (Snacks + extras) -->
