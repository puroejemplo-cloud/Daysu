<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <radialGradient id="bg" cx="30%" cy="60%" r="70%">
      <stop offset="0%" stop-color="#1a0520"/>
      <stop offset="55%" stop-color="#08000e"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="counter" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e1028"/>
      <stop offset="100%" stop-color="#0a0010"/>
    </linearGradient>
    <linearGradient id="slv" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="35%" stop-color="#e2e8f0"/>
      <stop offset="65%" stop-color="#64748b"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="gld" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <!-- Individual glass glow gradients -->
    <radialGradient id="g1" cx="50%" cy="100%" r="80%">
      <stop offset="0%" stop-color="#f472b6" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#f472b6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="50%" cy="100%" r="80%">
      <stop offset="0%" stop-color="#9333ea" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#9333ea" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g3" cx="50%" cy="100%" r="80%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g4" cx="50%" cy="100%" r="80%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g5" cx="50%" cy="100%" r="80%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g6" cx="50%" cy="100%" r="80%">
      <stop offset="0%" stop-color="#e879f9" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#e879f9" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Atmospheric glow on floor level -->
  <ellipse cx="270" cy="380" rx="260" ry="60" fill="#f472b6" opacity="0.06" filter="url(#softBlur)"/>
  <ellipse cx="270" cy="400" rx="200" ry="40" fill="#9333ea" opacity="0.08" filter="url(#softBlur)"/>

  <!-- BAR COUNTER -->
  <rect x="60" y="295" width="430" height="70" rx="4" fill="url(#counter)"/>
  <!-- Counter top surface (glossy) -->
  <rect x="60" y="292" width="430" height="12" rx="3" fill="#2d1545"/>
  <!-- Counter front LED strip -->
  <rect x="63" y="360" width="424" height="4" rx="2" fill="#f472b6" opacity="0.7" filter="url(#glow2)"/>
  <!-- Counter reflection on floor -->
  <rect x="80" y="362" width="400" height="60" fill="url(#counter)" opacity="0.4"/>

  <!-- === SHOT GLASSES === (6 glasses, evenly spaced) -->
  <!-- Glass shape: trapezoid wider at top, narrower at bottom (standard shot glass) -->
  <!-- Base: LED illuminated coaster -->

  <!-- Glass 1 — Pink (#f472b6) center ~x=100 -->
  <g transform="translate(82, 190)">
    <!-- LED glow base -->
    <ellipse cx="25" cy="108" rx="22" ry="8" fill="#f472b6" opacity="0.6" filter="url(#glow)"/>
    <rect x="10" y="100" width="30" height="4" rx="2" fill="#f472b6" opacity="0.9"/>
    <!-- Glass body -->
    <path d="M8 8 L12 100 L38 100 L42 8 Z" fill="#f472b6" opacity="0.1"/>
    <path d="M8 8 L12 100 L38 100 L42 8 Z" fill="none" stroke="#f472b6" stroke-width="1.5"/>
    <!-- Liquid inside -->
    <path d="M10 30 L13 100 L37 100 L40 30 Z" fill="#f472b6" opacity="0.25"/>
    <!-- Rim highlight -->
    <line x1="8" y1="8" x2="42" y2="8" stroke="#f8a8d4" stroke-width="2.5"/>
    <!-- Light beam upward -->
    <polygon points="12,8 38,8 50,-60 0,-60" fill="url(#g1)" opacity="0.35"/>
    <!-- Reflection on counter -->
    <path d="M8 108 L12 155 L38 155 L42 108 Z" fill="#f472b6" opacity="0.06"/>
  </g>

  <!-- Glass 2 — Purple (#9333ea) center ~x=170 -->
  <g transform="translate(147, 195)">
    <ellipse cx="25" cy="103" rx="22" ry="8" fill="#9333ea" opacity="0.6" filter="url(#glow)"/>
    <rect x="10" y="95" width="30" height="4" rx="2" fill="#9333ea" opacity="0.9"/>
    <path d="M8 8 L12 95 L38 95 L42 8 Z" fill="#9333ea" opacity="0.1"/>
    <path d="M8 8 L12 95 L38 95 L42 8 Z" fill="none" stroke="#9333ea" stroke-width="1.5"/>
    <path d="M10 35 L13 95 L37 95 L40 35 Z" fill="#9333ea" opacity="0.28"/>
    <line x1="8" y1="8" x2="42" y2="8" stroke="#c084fc" stroke-width="2.5"/>
    <polygon points="12,8 38,8 50,-65 0,-65" fill="url(#g2)" opacity="0.35"/>
    <path d="M8 103 L12 150 L38 150 L42 103 Z" fill="#9333ea" opacity="0.06"/>
  </g>

  <!-- Glass 3 — Cyan (#38bdf8) center ~x=240 -->
  <g transform="translate(218, 188)">
    <ellipse cx="25" cy="110" rx="22" ry="8" fill="#38bdf8" opacity="0.6" filter="url(#glow)"/>
    <rect x="10" y="102" width="30" height="4" rx="2" fill="#38bdf8" opacity="0.9"/>
    <path d="M8 8 L12 102 L38 102 L42 8 Z" fill="#38bdf8" opacity="0.1"/>
    <path d="M8 8 L12 102 L38 102 L42 8 Z" fill="none" stroke="#38bdf8" stroke-width="1.5"/>
    <path d="M10 28 L13 102 L37 102 L40 28 Z" fill="#38bdf8" opacity="0.22"/>
    <line x1="8" y1="8" x2="42" y2="8" stroke="#7dd3fc" stroke-width="2.5"/>
    <polygon points="12,8 38,8 50,-70 0,-70" fill="url(#g3)" opacity="0.35"/>
    <path d="M8 110 L12 155 L38 155 L42 110 Z" fill="#38bdf8" opacity="0.06"/>
  </g>

  <!-- Glass 4 — Green (#34d399) center ~x=310 -->
  <g transform="translate(288, 200)">
    <ellipse cx="25" cy="97" rx="22" ry="8" fill="#34d399" opacity="0.6" filter="url(#glow)"/>
    <rect x="10" y="89" width="30" height="4" rx="2" fill="#34d399" opacity="0.9"/>
    <path d="M8 8 L12 89 L38 89 L42 8 Z" fill="#34d399" opacity="0.1"/>
    <path d="M8 8 L12 89 L38 89 L42 8 Z" fill="none" stroke="#34d399" stroke-width="1.5"/>
    <path d="M10 40 L13 89 L37 89 L40 40 Z" fill="#34d399" opacity="0.26"/>
    <line x1="8" y1="8" x2="42" y2="8" stroke="#6ee7b7" stroke-width="2.5"/>
    <polygon points="12,8 38,8 50,-60 0,-60" fill="url(#g4)" opacity="0.32"/>
    <path d="M8 97 L12 145 L38 145 L42 97 Z" fill="#34d399" opacity="0.06"/>
  </g>

  <!-- Glass 5 — Gold (#fbbf24) center ~x=380 -->
  <g transform="translate(357, 193)">
    <ellipse cx="25" cy="105" rx="22" ry="8" fill="#fbbf24" opacity="0.6" filter="url(#glow)"/>
    <rect x="10" y="97" width="30" height="4" rx="2" fill="#fbbf24" opacity="0.9"/>
    <path d="M8 8 L12 97 L38 97 L42 8 Z" fill="#fbbf24" opacity="0.1"/>
    <path d="M8 8 L12 97 L38 97 L42 8 Z" fill="none" stroke="#fbbf24" stroke-width="1.5"/>
    <path d="M10 32 L13 97 L37 97 L40 32 Z" fill="#fbbf24" opacity="0.22"/>
    <line x1="8" y1="8" x2="42" y2="8" stroke="#fde68a" stroke-width="2.5"/>
    <polygon points="12,8 38,8 50,-65 0,-65" fill="url(#g5)" opacity="0.32"/>
    <path d="M8 105 L12 150 L38 150 L42 105 Z" fill="#fbbf24" opacity="0.06"/>
  </g>

  <!-- Glass 6 — Fuchsia (#e879f9) center ~x=450 -->
  <g transform="translate(430, 197)">
    <ellipse cx="25" cy="101" rx="22" ry="8" fill="#e879f9" opacity="0.6" filter="url(#glow)"/>
    <rect x="10" y="93" width="30" height="4" rx="2" fill="#e879f9" opacity="0.9"/>
    <path d="M8 8 L12 93 L38 93 L42 8 Z" fill="#e879f9" opacity="0.1"/>
    <path d="M8 8 L12 93 L38 93 L42 8 Z" fill="none" stroke="#e879f9" stroke-width="1.5"/>
    <path d="M10 36 L13 93 L37 93 L40 36 Z" fill="#e879f9" opacity="0.24"/>
    <line x1="8" y1="8" x2="42" y2="8" stroke="#f5d0fe" stroke-width="2.5"/>
    <polygon points="12,8 38,8 50,-62 0,-62" fill="url(#g6)" opacity="0.32"/>
    <path d="M8 101 L12 148 L38 148 L42 101 Z" fill="#e879f9" opacity="0.06"/>
  </g>

  <!-- Neon sign "SHATS TIME" style element -->
  <g transform="translate(75,50)">
    <rect x="0" y="0" width="200" height="75" rx="8" fill="#0a0010" stroke="#f472b6" stroke-width="1.5" opacity="0.8"/>
    <text x="100" y="32" text-anchor="middle" font-family="Georgia, serif" font-style="italic"
      font-size="22" fill="#f472b6" filter="url(#glow2)">Shots</text>
    <text x="100" y="60" text-anchor="middle" font-family="Georgia, serif" font-style="italic"
      font-size="22" fill="#f472b6" filter="url(#glow2)">Time</text>
  </g>

  <!-- Small sparkle accents -->
  <circle cx="68" cy="170" r="2.5" fill="#fbbf24" opacity="0.8" filter="url(#glow2)"/>
  <circle cx="490" cy="175" r="2" fill="#38bdf8" opacity="0.7"/>
  <circle cx="478" cy="140" r="3" fill="#f472b6" opacity="0.7" filter="url(#glow2)"/>
  <circle cx="78" cy="130" r="2" fill="#a78bfa" opacity="0.7"/>

  <!-- RIGHT SIDE TEXT PANEL -->
  <rect x="510" y="0" width="290" height="450" fill="#000" opacity="0.25"/>

  <!-- Shot glass icon -->
  <g transform="translate(524,52)" fill="none" stroke="#f472b6" stroke-width="3">
    <path d="M6 6 L10 46 L34 46 L38 6 Z"/>
    <line x1="8" y1="18" x2="36" y2="18"/>
    <path d="M10 46 L34 46" stroke-width="4" stroke-linecap="round"/>
  </g>
  <ellipse cx="546" cy="100" rx="16" ry="6" fill="#f472b6" opacity="0.5" filter="url(#glow2)"/>

  <!-- Category label -->
  <text x="525" y="130" font-family="Arial, sans-serif" font-size="13"
    letter-spacing="3" fill="#f472b6" font-weight="600">PAQUETE</text>

  <!-- Main title -->
  <text x="525" y="175" font-family="'Arial Black', Arial, sans-serif"
    font-size="42" font-weight="900" fill="url(#slv)">SHOTS</text>
  <text x="525" y="215" font-family="'Arial Black', Arial, sans-serif"
    font-size="28" font-weight="900" letter-spacing="1" fill="url(#slv)">ILUMINADOS</text>

  <!-- Neon divider -->
  <line x1="525" y1="233" x2="775" y2="233"
    stroke="#f472b6" stroke-width="1.5" opacity="0.7" filter="url(#glow2)"/>

  <!-- Feature bullets -->
  <g font-family="Arial, sans-serif" font-size="14" fill="#e2e8f0">
    <circle cx="537" cy="260" r="3" fill="#f472b6"/>
    <text x="550" y="265">Shots con base LED RGB</text>
    <circle cx="537" cy="289" r="3" fill="#f472b6"/>
    <text x="550" y="294">6 colores sincronizados</text>
    <circle cx="537" cy="318" r="3" fill="#f472b6"/>
    <text x="550" y="323">Barra de servicio incluida</text>
    <circle cx="537" cy="347" r="3" fill="#f472b6"/>
    <text x="550" y="352">Ambientación completa</text>
  </g>

  <!-- Gold separator -->
  <line x1="525" y1="373" x2="775" y2="373" stroke="#f59e0b" stroke-width="1" opacity="0.6"/>

  <!-- Brand footer -->
  <text x="525" y="397" font-family="Arial, sans-serif" font-size="11"
    letter-spacing="2" fill="#f59e0b" opacity="0.9">AURA PRODUCCIONES</text>
  <text x="525" y="417" font-family="Georgia, serif" font-style="italic" font-size="11"
    fill="#94a3b8" opacity="0.7">Creamos momentos inolvidables</text>
</svg>
