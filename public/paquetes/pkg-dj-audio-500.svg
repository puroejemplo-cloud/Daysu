<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
<defs>
  <radialGradient id="d5-bg" cx="50%" cy="35%" r="75%">
    <stop offset="0%" stop-color="#1a1000"/><stop offset="100%" stop-color="#050300"/>
  </radialGradient>
  <linearGradient id="d5-gold" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#f59e0b" stop-opacity="0"/><stop offset="30%" stop-color="#f59e0b"/>
    <stop offset="70%" stop-color="#fbbf24"/><stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="d5-spk" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#1c1500"/><stop offset="100%" stop-color="#0a0900"/>
  </linearGradient>
  <linearGradient id="d5-beam1" x1="30%" y1="100%" x2="0%" y2="0%">
    <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.45"/><stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="d5-beam2" x1="70%" y1="100%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.45"/><stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
  </linearGradient>
  <filter id="d5-neo" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur stdDeviation="12" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="d5-glow" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>
