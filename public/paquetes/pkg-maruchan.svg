<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
<defs>
  <radialGradient id="mr-bg" cx="50%" cy="35%" r="75%">
    <stop offset="0%" stop-color="#052e16"/><stop offset="100%" stop-color="#030a06"/>
  </radialGradient>
  <linearGradient id="mr-gold" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#f59e0b" stop-opacity="0"/><stop offset="30%" stop-color="#f59e0b"/>
    <stop offset="70%" stop-color="#fbbf24"/><stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
  </linearGradient>
  <filter id="mr-neo" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur stdDeviation="12" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="mr-glow" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>
<rect width="800" height="450" fill="url(#mr-bg)"/>
<ellipse cx="400" cy="150" rx="360" ry="180" fill="#34d399" fill-opacity="0.05"/>
<rect x="0" y="0" width="800" height="2" fill="url(#mr-gold)"/>

<text x="400" y="40" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#6ee7b7" letter-spacing="8">SONIDO DAYSU · COMPLEMENTO</text>
<text x="400" y="90" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="30" font-weight="900" fill="#34d399" fill-opacity="0.5" letter-spacing="1" filter="url(#mr-neo)">CARRITO MARUCHANFEST</text>
<text x="400" y="90" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="30" font-weight="900" fill="#ffffff" letter-spacing="1">CARRITO MARUCHANFEST</text>
<text x="400" y="113" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="18" font-weight="900" fill="#34d399" letter-spacing="2">50 PERSONAS</text>

<line x1="80" y1="128" x2="720" y2="128" stroke="url(#mr-gold)" stroke-width="1.2"/>

<text x="400" y="163" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="32" font-weight="900" fill="#fbbf24" filter="url(#mr-glow)">$2,000 MXN</text>
<text x="400" y="181" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#94a3b8" letter-spacing="3">COMPLEMENTO DISPONIBLE PARA TODOS LOS PAQUETES</text>

<line x1="160" y1="194" x2="640" y2="194" stroke="url(#mr-gold)" stroke-width="0.7" stroke-opacity="0.4"/>

<text x="220" y="218" font-family="Arial,sans-serif" font-size="14" fill="#34d399">✦</text>
<text x="244" y="218" font-family="Arial,sans-serif" font-size="14" fill="#e2e8f0">Carrito de maruchan (sopa instantánea)</text>
<text x="220" y="244" font-family="Arial,sans-serif" font-size="14" fill="#34d399">✦</text>
<text x="244" y="244" font-family="Arial,sans-serif" font-size="14" fill="#e2e8f0">Servicio para 50 personas</text>
<text x="220" y="270" font-family="Arial,sans-serif" font-size="14" fill="#34d399">✦</text>
<text x="244" y="270" font-family="Arial,sans-serif" font-size="14" fill="#e2e8f0">Incluye toppings y sazón</text>
<text x="220" y="296" font-family="Arial,sans-serif" font-size="13" fill="#059669">✦</text>
<text x="244" y="296" font-family="Arial,sans-serif" font-size="13" fill="#94a3b8" font-style="italic">Agrégalo a cualquier paquete</text>

<!-- BOTTOM STRIP -->
<rect x="0" y="310" width="800" height="140" fill="#020d06"/>
<line x1="0" y1="310" x2="800" y2="310" stroke="url(#mr-gold)" stroke-width="1.2"/>

<!-- ICON: Cart with ramen bowl -->
<g transform="translate(295,318)">
  <!-- Cart body -->
  <rect x="20" y="42" width="170" height="75" rx="6" fill="#0a2e18" stroke="#34d399" stroke-width="2" filter="url(#mr-glow)"/>
  <rect x="20" y="42" width="170" height="75" rx="6" fill="none" stroke="#a7f3d0" stroke-width="0.8"/>
  <!-- LED strip bottom -->
  <rect x="22" y="114" width="166" height="3" rx="1" fill="#34d399" fill-opacity="0.6" filter="url(#mr-glow)"/>
  <!-- Handle -->
  <rect x="182" y="40" width="14" height="56" rx="5" fill="#0a2e18" stroke="#34d399" stroke-width="1.5"/>
  <!-- Wheels -->
  <circle cx="44"  cy="126" r="12" fill="#051a0d" stroke="#34d399" stroke-width="1.5"/>
  <circle cx="44"  cy="126" r="6"  fill="#34d399" fill-opacity="0.3"/>
  <circle cx="162" cy="126" r="12" fill="#051a0d" stroke="#34d399" stroke-width="1.5"/>
  <circle cx="162" cy="126" r="6"  fill="#34d399" fill-opacity="0.3"/>
  <!-- Ramen bowl on cart -->
  <ellipse cx="107" cy="42" rx="38" ry="10" fill="#15803d" fill-opacity="0.6"/>
  <path d="M69 42 Q69 20 107 20 Q145 20 145 42" fill="#0a2e18" stroke="#34d399" stroke-width="1.5"/>
  <ellipse cx="107" cy="42" rx="38" ry="10" fill="none" stroke="#34d399" stroke-width="1.5"/>
  <!-- Steam lines -->
  <path d="M95 18 Q92 10 96 4" fill="none" stroke="#6ee7b7" stroke-width="2" stroke-linecap="round" stroke-opacity="0.7"/>
  <path d="M107 16 Q104 8 108 2" fill="none" stroke="#6ee7b7" stroke-width="2" stroke-linecap="round" stroke-opacity="0.7"/>
  <path d="M119 18 Q116 10 120 4" fill="none" stroke="#6ee7b7" stroke-width="2" stroke-linecap="round" stroke-opacity="0.7"/>
  <!-- Noodles inside bowl -->
  <path d="M82 35 Q95 28 107 35 Q119 28 132 35" fill="none" stroke="#fde68a" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Spoon/chopstick -->
  <line x1="134" y1="14" x2="128" y2="40" stroke="#d97706" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Content on shelf -->
  <rect x="38" y="52" width="22" height="28" rx="3" fill="#166534" stroke="#34d399" stroke-width="1"/>
  <text x="49" y="70" text-anchor="middle" font-family="Arial" font-size="8" fill="#86efac" font-weight="700">マル</text>
  <rect x="68" y="54" width="22" height="26" rx="3" fill="#166534" stroke="#34d399" stroke-width="1"/>
  <text x="79" y="71" text-anchor="middle" font-family="Arial" font-size="8" fill="#86efac" font-weight="700">チャ</text>
  <rect x="98" y="52" width="22" height="28" rx="3" fill="#14532d" stroke="#34d399" stroke-width="1"/>
  <!-- Glow -->
  <ellipse cx="107" cy="136" rx="85" ry="6" fill="#34d399" fill-opacity="0.12" filter="url(#mr-glow)"/>
</g>

<text x="400" y="440" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#6ee7b7" letter-spacing="3">SNACK STATION · 50 PERSONAS · COMPLEMENTO</text>
<rect x="0" y="448" width="800" height="2" fill="url(#mr-gold)"/>
</svg>
